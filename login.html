<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Resume </title>

    <!-- Google Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="login.css">
</head>

<body>

    <main class="container">

        <!-- Left Side -->
        <section class="form-section">

            <header class="logo">
                <i class="fa-solid fa-cube"></i>
                <h2>ResumeFlow</h2>
            </header>

            <article class="form-content">

                <header>
                    <h1>Create an Account</h1>
                    <p>Join now to streamline your experience from day one.</p>
                </header>

                <form>

                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Roger Gerrard">

                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ResumeFlow@company.com">

                    <label for="password">Password</label>

                    <article class="password-box">
                        <input type="password" id="password" placeholder="Password">
                        <i class="fa-regular fa-eye-slash"></i>
                    </article>

                    <label for="confirm">Confirm Password</label>

                    <article class="password-box">
                        <input type="password" id="confirm" placeholder="Confirm Password">
                        <i class="fa-regular fa-eye-slash"></i>
                    </article>

                    <button type="submit">
                        Register
                    </button>

                </form>

                <section class="divider">
                    <span></span>
                    <p>Or Register With</p>
                    <span></span>
                </section>

                <section class="social-login">

                    <button>
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>

                    <button>
                        <i class="fa-brands fa-apple"></i>
                        Apple
                    </button>

                </section>

                <p class="signin">
                    Already Have An Account?
                    <a href="#">Sign In.</a>
                </p>

            </article>

            <footer class="footer">
                <p>Copyright © 2025 Sellora Enterprises LTD.</p>
                <a href="#">Privacy Policy</a>
            </footer>

        </section>

        <!-- Right Side -->

        <section class="image-section">

            <article class="overlay">

                <figure>
                    <img src="images\login_side_image.png" alt="Dashboard Preview">
                </figure>

            </article>

        </section>

    </main>

</body>

</html>
